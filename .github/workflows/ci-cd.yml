name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 |
        docker login --username AWS --password-stdin 498735610365.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t sentiment-analysis .

    - name: Tag Docker image
      run: |
        docker tag sentiment-analysis:latest 498735610365.dkr.ecr.us-east-1.amazonaws.com/sentiment-analysis-service:latest

    - name: Push Docker image
      run: |
        docker push 498735610365.dkr.ecr.us-east-1.amazonaws.com/sentiment-analysis-service:latest